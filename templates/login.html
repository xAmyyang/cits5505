<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — SurviveChef</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Nunito font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
  <!-- SurviveChef brand -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/survivechef-bootstrap-theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/survivechef-animations.css') }}">
  <!-- Auth page styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="auth-page">

  <!-- ── Animated background ── -->
  <div class="auth-bg-gradient" aria-hidden="true"></div>
  <div class="auth-dots"        aria-hidden="true"></div>

  <!-- Blobs -->
  <div class="auth-blob blob-pink"   aria-hidden="true"></div>
  <div class="auth-blob blob-green"  aria-hidden="true"></div>
  <div class="auth-blob blob-yellow" aria-hidden="true"></div>
  <div class="auth-blob blob-purple" aria-hidden="true"></div>

  <!-- Floating food -->
  <span class="auth-food af-1" aria-hidden="true">🍳</span>
  <span class="auth-food af-2" aria-hidden="true">🧀</span>
  <span class="auth-food af-3" aria-hidden="true">🥚</span>
  <span class="auth-food af-4" aria-hidden="true">🍋</span>

  <!-- ── Navbar ── -->
  <nav class="auth-nav" aria-label="site navigation">
    <a class="auth-logo" href="{{ url_for('home') }}">
      survive<span>chef</span>
      <span class="auth-logo-badge">✨ beta</span>
    </a>
    <span class="auth-nav-hint">
      no account? <a href="{{ url_for('signup') }}">sign up free →</a>
    </span>
  </nav>

  <!-- ── Card ── -->
  <main class="auth-wrap" id="main-content">
    <div class="auth-card" role="main">

      <!-- Card header -->
      <div class="auth-card-head">
        <span class="auth-card-emoji" aria-hidden="true">👋</span>
        <h1 class="auth-card-title">welcome back!</h1>
        <p  class="auth-card-sub">log in to save recipes &amp; more</p>
      </div>

      <!-- Card body -->
      <div class="auth-card-body">

        <!-- Social buttons -->
        <div class="auth-social-row">
          <button class="auth-social-btn" type="button" id="googleBtn">
            <span aria-hidden="true">🌐</span> continue with Google
          </button>
          <button class="auth-social-btn" type="button" id="appleBtn">
            <span aria-hidden="true">🍎</span> continue with Apple
          </button>
        </div>

        <div class="auth-divider"><span>or</span></div>

        <!-- Login form -->
        <form id="loginForm" novalidate autocomplete="on">

          <!-- Email -->
          <div class="auth-field">
            <label for="loginEmail">email address</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon" aria-hidden="true">✉️</span>
              <input
                type="email"
                id="loginEmail"
                name="email"
                class="auth-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              >
            </div>
            <p class="auth-field-err" id="loginEmailErr" role="alert" aria-live="polite"></p>
          </div>

          <!-- Password -->
          <div class="auth-field">
            <div class="auth-field-label-row">
              <label for="loginPassword">password</label>
              <a href="#" class="auth-forgot">forgot password?</a>
            </div>
            <div class="auth-input-wrap">
              <span class="auth-input-icon" aria-hidden="true">🔒</span>
              <input
                type="password"
                id="loginPassword"
                name="password"
                class="auth-input"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              >
              <button
                type="button"
                class="auth-pw-toggle"
                data-target="loginPassword"
                aria-label="show password"
              >👁</button>
            </div>
            <p class="auth-field-err" id="loginPasswordErr" role="alert" aria-live="polite"></p>
          </div>

          <!-- Remember me -->
          <div class="auth-check-row">
            <input type="checkbox" id="rememberMe" name="remember" checked>
            <label for="rememberMe">keep me logged in</label>
          </div>

          <!-- Submit -->
          <button type="submit" class="auth-submit-btn" id="loginSubmitBtn">
            <span class="auth-btn-spinner" aria-hidden="true"></span>
            <span class="auth-btn-label">log in 🍳</span>
          </button>

          <!-- Global error banner -->
          <div class="auth-alert auth-alert-error" id="loginGlobalErr" role="alert" aria-live="assertive" hidden>
            <span class="auth-alert-icon">⚠️</span>
            <span id="loginGlobalErrMsg"></span>
          </div>

        </form>

        <!-- Switch to signup -->
        <p class="auth-switch">
          don't have an account? <a href="{{ url_for('signup') }}">sign up free</a>
        </p>

      </div><!-- /.auth-card-body -->
    </div><!-- /.auth-card -->
  </main>

</div><!-- /.auth-page -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Auth logic -->
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>
  // Boot: if already logged in, redirect to home
  Auth.redirectIfLoggedIn('{{ url_for("home") }}');

  // Wire up social buttons
  document.getElementById('googleBtn').addEventListener('click', () => Auth.socialSignIn('Google'));
  document.getElementById('appleBtn').addEventListener('click',  () => Auth.socialSignIn('Apple'));

  // Wire up form
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    await Auth.handleLogin();
  });

  // Wire up password toggle
  document.querySelectorAll('.auth-pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => Auth.togglePassword(btn.dataset.target, btn));
  });
</script>
</body>
</html>

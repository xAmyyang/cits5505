<!-- Profile Header -->
<div class="profile-header">
  <div class="text-center px-3">
    <div class="avatar-ring sc-fade-up">🧑‍🍳</div>
    <div class="profile-name sc-fade-up-1">Alex Chen</div>

    <div class="d-flex justify-content-center gap-3 mb-4 sc-fade-up-3">
      <div class="stat-pill">
        <span class="num">12</span>
        <span class="lbl">recipes</span>
      </div>
      <div class="stat-pill">
        <span class="num">48</span>

      </div>
      <div class="stat-pill">
        <span class="num">136</span>
        <span class="lbl">likes got</span>
      </div>
    </div>
 
    <button class="edit-btn sc-fade-up-3 mb-1">✏️ edit profile</button>
  </div>
 <!-- Tabs -->
  <div class="sc-tabs container" style="max-width:860px;">
    <button class="sc-tab active" onclick="switchTab('my-recipes')">🍳 My Recipes</button>
    <button class="sc-tab" onclick="switchTab('achievements')">🏅 Achievements</button>
